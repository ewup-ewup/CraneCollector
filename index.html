<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Crane Collector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #1a1a1a; font-family: -apple-system, sans-serif; color: white; overflow: hidden; }

    #gameContainer { width: 100%; height: 100%; position: relative; }

    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
    .modal.show { display: flex; }
    .modal-content { text-align: center; padding: 20px; }

    h1 { font-size: 48px; color: #ffd700; margin: 20px 0; }
    h2 { font-size: 36px; color: white; margin: 20px 0; }

    .stat { margin: 16px 0; }
    .stat-label { color: rgba(255,255,255,0.6); font-size: 13px; }
    .stat-value { color: #ffd700; font-weight: bold; font-size: 32px; margin-top: 4px; }

    button { padding: 12px 24px; background: #ffd700; color: #1a1a1a; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px; margin: 8px; }
    button:active { transform: scale(0.95); }

    #gameUI { position: fixed; top: 12px; left: 12px; z-index: 10; font-size: 13px; display: none; }
    #gameUI.show { display: block; }

    #gameControls { position: fixed; bottom: 12px; left: 12px; right: 12px; display: none; gap: 12px; z-index: 10; }
    #gameControls.show { display: flex; }
    #gameControls button { flex: 1; margin: 0; padding: 12px; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="gameUI">
      <div>⏱ <span id="timeLeft">30</span>s | 📊 <span id="scoreUI">0</span></div>
      <div style="margin-top: 4px; font-size: 11px;">📦 <span id="boxLeftUI">8</span>/8</div>
    </div>

    <div id="gameControls">
      <button id="lowerBtn">⬇ Lower</button>
      <button id="rotBtn">🔄 Rotate</button>
    </div>
  </div>

  <div id="mainMenuModal" class="modal show">
    <div class="modal-content">
      <h1>🎮 CRANE COLLECTOR</h1>
      <p style="color: rgba(255,255,255,0.7); margin-bottom: 32px;">橋渡し式 인형뽑기 시뮬레이터</p>

      <div class="stat">
        <div class="stat-label">🏆 Best Score</div>
        <div class="stat-value" id="bestScoreDisplay">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">📈 Total Plays</div>
        <div class="stat-value" id="totalPlaysDisplay">0</div>
      </div>

      <button id="startBtn" style="margin-top: 48px; padding: 16px 40px; font-size: 18px;">▶ START GAME</button>
    </div>
  </div>

  <div id="gameOverModal" class="modal">
    <div class="modal-content">
      <h2>Game Over</h2>
      <div class="stat">
        <div class="stat-label">Your Score</div>
        <div class="stat-value" id="finalScoreDisplay">0</div>
      </div>
      <button id="playAgainBtn" style="margin-top: 32px;">Play Again</button>
      <button id="menuBtn">Back to Menu</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>

  <script>
    // Game variables
    let gameState = {
      score: 0,
      time: 30,
      playing: false,
      bestScore: parseInt(localStorage.getItem('bestScore')) || 0,
      totalPlays: parseInt(localStorage.getItem('totalPlays')) || 0,
    };

    let scene, camera, renderer, world;
    let clawGroup, boxes = [];
    let clawX = 0, clawZ = 0, clawDepth = 0, clawRot = 0, gripping = false;

    function setupGame() {
      const canvas = document.getElementById('gameCanvas');

      // Scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x2a2a3e);
      scene.fog = new THREE.Fog(0x2a2a3e, 50, 100);

      // Camera
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 12);
      camera.lookAt(0, 4, 0);

      // Renderer
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.6));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(10, 15, 10);
      dirLight.castShadow = true;
      scene.add(dirLight);

      // Physics
      world = new CANNON.World();
      world.gravity.set(0, -9.82, 0);

      // Floor
      const floorMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x3a3a4e })
      );
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.position.y = -0.5;
      floorMesh.receiveShadow = true;
      scene.add(floorMesh);

      const floorBody = new CANNON.Body({ mass: 0 });
      floorBody.addShape(new CANNON.Plane());
      floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
      world.addBody(floorBody);

      // Bars
      const barGeo = new THREE.CylinderGeometry(0.15, 0.15, 8, 16);
      const barMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8 });

      ['left', 'right'].forEach((side, i) => {
        const bar = new THREE.Mesh(barGeo, barMat.clone());
        bar.position.set(side === 'left' ? -2 : 2, 2, 0);
        bar.rotation.z = Math.PI / 2;
        bar.castShadow = true;
        scene.add(bar);
      });

      // Claw
      clawGroup = new THREE.Group();
      clawGroup.position.set(0, 5, 0);
      scene.add(clawGroup);

      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 3, 0.3),
        new THREE.MeshStandardMaterial({ color: 0xff6b6b })
      );
      arm.position.y = -1.5;
      arm.castShadow = true;
      clawGroup.add(arm);

      const fingerGeo = new THREE.BoxGeometry(0.3, 0.5, 1);
      const fingerMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b });

      const fingerL = new THREE.Mesh(fingerGeo, fingerMat.clone());
      fingerL.position.set(-0.4, -3.5, 0);
      fingerL.castShadow = true;
      clawGroup.add(fingerL);

      const fingerR = new THREE.Mesh(fingerGeo, fingerMat.clone());
      fingerR.position.set(0.4, -3.5, 0);
      fingerR.castShadow = true;
      clawGroup.add(fingerR);

      // Create boxes
      const boxGeo = new THREE.BoxGeometry(1, 1, 1);
      const boxMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });

      for (let i = 0; i < 8; i++) {
        const mesh = new THREE.Mesh(boxGeo, boxMat.clone());
        mesh.position.set(
          (Math.random() - 0.5) * 2.5,
          2.5 + Math.random() * 2,
          (Math.random() - 0.5) * 1.5
        );
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        const body = new CANNON.Body({ mass: 1, linearDamping: 0.3, angularDamping: 0.3 });
        body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
        body.position.copy(mesh.position);
        world.addBody(body);

        boxes.push({ mesh, body, collected: false });
      }

      // Input
      let touchX = 0, touchY = 0;
      document.addEventListener('touchstart', e => {
        if (!gameState.playing) return;
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
      });

      document.addEventListener('touchmove', e => {
        if (!gameState.playing) return;
        e.preventDefault();
        const dx = (e.touches[0].clientX - touchX) * 0.01;
        const dy = (e.touches[0].clientY - touchY) * 0.01;
        clawX += dx;
        clawZ -= dy;
        clawX = Math.max(-3.5, Math.min(3.5, clawX));
        clawZ = Math.max(-3.5, Math.min(3.5, clawZ));
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
      });

      document.getElementById('lowerBtn').onclick = () => { if (gameState.playing) gripping = !gripping; };
      document.getElementById('rotBtn').onclick = () => { if (gameState.playing) clawRot += Math.PI / 4; };

      // Game loop
      let lastTime = Date.now();

      function gameLoop() {
        requestAnimationFrame(gameLoop);

        if (!gameState.playing) {
          renderer.render(scene, camera);
          return;
        }

        const now = Date.now();
        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Update time
        gameState.time -= delta;
        if (gameState.time <= 0) {
          gameState.time = 0;
          endGame();
          return;
        }

        // Physics step
        world.step(1 / 60);

        // Update claw
        if (gripping && clawDepth < 1) clawDepth += delta * 2;
        else if (!gripping && clawDepth > 0) clawDepth -= delta * 2;
        clawDepth = Math.max(0, Math.min(1, clawDepth));

        clawGroup.position.set(clawX, 5 - clawDepth * 3, clawZ);
        clawGroup.rotation.y = clawRot;

        // Update boxes
        boxes.forEach(box => {
          if (!box.collected) {
            box.mesh.position.copy(box.body.position);
            box.mesh.quaternion.copy(box.body.quaternion);

            if (box.body.position.y < -5) {
              box.collected = true;
              gameState.score += 100;
              document.getElementById('boxLeftUI').textContent = boxes.filter(b => !b.collected).length;
            }
          }
        });

        // Update UI
        document.getElementById('timeLeft').textContent = Math.ceil(gameState.time);
        document.getElementById('scoreUI').textContent = gameState.score;

        renderer.render(scene, camera);
      }

      gameLoop();

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function startGame() {
      // Reset state
      gameState.score = 0;
      gameState.time = 30;
      gameState.playing = true;
      clawX = clawZ = clawDepth = clawRot = 0;
      gripping = false;

      // Hide menus
      document.getElementById('mainMenuModal').classList.remove('show');
      document.getElementById('gameOverModal').classList.remove('show');
      document.getElementById('gameUI').classList.add('show');
      document.getElementById('gameControls').classList.add('show');

      // Initialize scene on first play
      if (!scene) {
        setupGame();
      } else {
        // Reset boxes
        boxes.forEach(b => {
          scene.remove(b.mesh);
          world.removeBody(b.body);
        });
        boxes = [];

        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });

        for (let i = 0; i < 8; i++) {
          const mesh = new THREE.Mesh(boxGeo, boxMat.clone());
          mesh.position.set(
            (Math.random() - 0.5) * 2.5,
            2.5 + Math.random() * 2,
            (Math.random() - 0.5) * 1.5
          );
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          scene.add(mesh);

          const body = new CANNON.Body({ mass: 1, linearDamping: 0.3, angularDamping: 0.3 });
          body.addShape(new CANNON.Box(new CANNON.Vec3(0.5, 0.5, 0.5)));
          body.position.copy(mesh.position);
          world.addBody(body);

          boxes.push({ mesh, body, collected: false });
        }

        document.getElementById('boxLeftUI').textContent = '8';
      }
    }

    function endGame() {
      gameState.playing = false;
      gameState.totalPlays++;

      if (gameState.score > gameState.bestScore) {
        gameState.bestScore = gameState.score;
        localStorage.setItem('bestScore', gameState.bestScore);
      }
      localStorage.setItem('totalPlays', gameState.totalPlays);

      document.getElementById('finalScoreDisplay').textContent = gameState.score;
      document.getElementById('gameOverModal').classList.add('show');
      document.getElementById('gameUI').classList.remove('show');
      document.getElementById('gameControls').classList.remove('show');
    }

    function showMenu() {
      document.getElementById('bestScoreDisplay').textContent = gameState.bestScore;
      document.getElementById('totalPlaysDisplay').textContent = gameState.totalPlays;
      document.getElementById('mainMenuModal').classList.add('show');
      document.getElementById('gameOverModal').classList.remove('show');
      document.getElementById('gameUI').classList.remove('show');
      document.getElementById('gameControls').classList.remove('show');
    }

    // Event listeners
    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('playAgainBtn').onclick = startGame;
    document.getElementById('menuBtn').onclick = showMenu;

    // Show menu on load
    showMenu();
  </script>
</body>
</html>
