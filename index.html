<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crane Collector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: white; font-family: Arial, sans-serif; width: 100vw; height: 100vh; overflow: hidden; }
    #menu { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; flex-direction: column; }
    #menu.hidden { display: none; }
    #game { display: none; width: 100%; height: 100%; position: relative; }
    #game.show { display: block; }
    canvas { display: block; width: 100%; height: 100%; }
    #info { position: fixed; top: 10px; left: 10px; z-index: 10; font-size: 14px; }
    #info.hidden { display: none; }
    #buttons { position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 10; display: flex; gap: 10px; }
    #buttons.hidden { display: none; }
    button { padding: 10px 20px; background: #ffd700; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
    h1 { font-size: 48px; color: #ffd700; margin: 20px; }
    .stat { margin: 20px; font-size: 20px; }
  </style>
</head>
<body>
  <div id="menu">
    <h1>🎮 Crane Collector</h1>
    <div class="stat">Best: <span id="best">0</span></div>
    <div class="stat">Plays: <span id="plays">0</span></div>
    <button onclick="playGame()">START GAME</button>
  </div>

  <div id="game">
    <canvas></canvas>
    <div id="info">
      <div>Time: <span id="time">30</span>s | Score: <span id="score">0</span></div>
      <div style="font-size: 12px;">Boxes: <span id="boxes">8</span>/8</div>
    </div>
    <div id="buttons">
      <button onclick="toggleGrip()">Lower</button>
      <button onclick="rotateClw()">Rotate</button>
    </div>
  </div>

  <script>
    let stats = {
      best: parseInt(localStorage.getItem('best') || '0'),
      plays: parseInt(localStorage.getItem('plays') || '0')
    };

    let game = {
      score: 0,
      time: 30,
      running: false
    };

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('game').classList.remove('show');
      document.getElementById('info').classList.add('hidden');
      document.getElementById('buttons').classList.add('hidden');
      document.getElementById('best').textContent = stats.best;
      document.getElementById('plays').textContent = stats.plays;
    }

    function playGame() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('game').classList.add('show');
      document.getElementById('info').classList.remove('hidden');
      document.getElementById('buttons').classList.remove('hidden');

      game.score = 0;
      game.time = 30;
      game.running = true;

      startGameLoop();
    }

    function toggleGrip() {
      if (game.running) console.log('Grip toggled');
    }

    function rotateClw() {
      if (game.running) console.log('Rotated');
    }

    function startGameLoop() {
      const canvas = document.querySelector('canvas');
      const ctx = canvas.getContext('2d');

      // Set canvas size
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let lastTime = Date.now();

      function loop() {
        if (!game.running) return;

        const now = Date.now();
        const delta = (now - lastTime) / 1000;
        lastTime = now;

        // Update time
        game.time -= delta;
        if (game.time <= 0) {
          game.time = 0;
          game.running = false;
          endGame();
          return;
        }

        // Draw
        ctx.fillStyle = '#2a2a3e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw floor
        ctx.fillStyle = '#3a3a4e';
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        // Draw boxes
        ctx.fillStyle = '#aaaaaa';
        for (let i = 0; i < 8; i++) {
          const x = 50 + (i % 4) * 80;
          const y = 100 + Math.floor(i / 4) * 80;
          ctx.fillRect(x, y, 60, 60);
          ctx.strokeStyle = '#888';
          ctx.lineWidth = 2;
          ctx.strokeRect(x, y, 60, 60);
        }

        // Draw claw
        ctx.fillStyle = '#ff6b6b';
        ctx.fillRect(canvas.width / 2 - 15, 50, 30, 20);
        ctx.fillRect(canvas.width / 2 - 20, 70, 10, 40);
        ctx.fillRect(canvas.width / 2 + 10, 70, 10, 40);

        // Update UI
        document.getElementById('time').textContent = Math.ceil(game.time);
        document.getElementById('score').textContent = game.score;

        requestAnimationFrame(loop);
      }

      loop();
    }

    function endGame() {
      stats.plays++;
      if (game.score > stats.best) {
        stats.best = game.score;
      }
      localStorage.setItem('best', stats.best);
      localStorage.setItem('plays', stats.plays);

      alert('Game Over!\nScore: ' + game.score + '\nBest: ' + stats.best);
      showMenu();
    }

    // Handle window resize
    window.addEventListener('resize', () => {
      const canvas = document.querySelector('canvas');
      if (canvas) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    });

    // Start
    showMenu();
  </script>
</body>
</html>
